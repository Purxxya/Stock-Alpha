<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trinity AI — Stock Analysis Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: #ffff;
            background-image:
                radial-gradient(at 15% 20%, rgba(239,68,68,0.08) 0, transparent 55%),
                radial-gradient(at 85% 80%, rgba(239,68,68,0.06) 0, transparent 50%);
        }

        /* Left panel gradient */
        .left-panel {
            background: linear-gradient(145deg, #ef4444 0%, #b91c1c 55%, #991b1b 100%);
            position: relative; overflow: hidden;
        }
        /* Decorative rings */
        .left-panel::before {
            content: '';
            position: absolute;
            width: 380px; height: 380px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.13);
            top: -120px; right: -120px;
            pointer-events: none;
        }
        .left-panel::after {
            content: '';
            position: absolute;
            width: 220px; height: 220px; border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.10);
            bottom: -70px; left: -70px;
            pointer-events: none;
        }

        /* Input focus ring */
        .field-input { transition: border-color 0.15s, box-shadow 0.15s, background 0.15s; }
        .field-input:focus {
            border-color: #dc2626 !important;
            box-shadow: 0 0 0 3px rgba(220,38,38,0.13);
            background: #fff !important;
            outline: none;
        }
        .field-input.err { border-color: #dc2626 !important; }

        /* Message animation */
        .msg { display:none; animation: fadeDown .2s ease; }
        .msg.show { display:flex; }
        @keyframes fadeDown {
            from { opacity:0; transform:translateY(-5px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Spinner */
        .spin {
            width:17px; height:17px;
            border: 2.5px solid rgba(255,255,255,0.35);
            border-top-color: white;
            border-radius: 50%;
            animation: rotate .65s linear infinite;
            display: none; flex-shrink: 0;
        }
        @keyframes rotate { to { transform: rotate(360deg); } }

        /* Card shadow */
        .card { box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 24px 64px rgba(0,0,0,0.12); }

        /* Stat pill */
        .stat-pill {
            background: rgba(255,255,255,0.13);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 14px;
            padding: 13px 16px;
        }

        /* Dashboard */
        #dashSection { display:none; }
        .dash-card { box-shadow: 0 0 0 1px rgba(0,0,0,0.06), 0 16px 48px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-8">

<!-- ====================================================
     AUTH SECTION
==================================================== -->
<div id="authSection" class="w-full max-w-4xl xl:max-w-5xl">
    <div class="card grid grid-cols-1 md:grid-cols-2 rounded-3xl overflow-hidden">

        <!-- ─── LEFT: Branding ─── -->
        <div class="left-panel relative flex flex-col justify-between p-10 py-12 min-h-[300px]">

            <!-- Chart decoration -->
            <svg class="absolute bottom-0 left-0 right-0 opacity-[0.12]" viewBox="0 0 440 130" preserveAspectRatio="none">
                <polyline points="0,110 50,85 100,95 165,55 220,65 280,30 340,42 390,16 440,5"
                    fill="none" stroke="white" stroke-width="2"/>
                <polygon points="0,110 50,85 100,95 165,55 220,65 280,30 340,42 390,16 440,5 440,130 0,130"
                    fill="white" opacity="0.5"/>
                <polyline points="0,125 60,115 130,120 200,105 270,108 350,95 440,85"
                    fill="none" stroke="white" stroke-width="1" opacity="0.6"/>
            </svg>

            <!-- Top -->
            <div class="relative z-10">
                <!-- Logo -->
                <div class="flex items-center gap-3 mb-8">
                    <div class="w-11 h-11 bg-white/20 rounded-2xl flex items-center justify-center border border-white/30 shadow-lg">
                        <svg class="w-5 h-5" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                        </svg>
                    </div>
                    <span class="text-white font-extrabold text-lg tracking-tight">STOCK ALPHA</span>
                </div>

                <!-- Live badge -->
                <div class="inline-flex items-center gap-2 bg-white/15 border border-white/25 rounded-full px-4 py-1.5 mb-6">
                    <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse"></span>
                    <span class="text-white/90 text-xs font-semibold">Live · SET100 Market Data</span>
                </div>

               
                <p class="text-white/70 text-sm leading-relaxed max-w-[260px]">
                    Access your stock analysis and portfolio anytime, anywhere.
                </p>
            </div>
        </div>

        <!-- ─── RIGHT: Auth Form ─── -->
        <div class="bg-white flex flex-col justify-center px-10 py-12">

            <!-- SIGN IN -->
            <div id="panelSignIn">
                <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-1">Sign In</h1>
                <p class="text-slate-400 text-sm mb-7">Enter your credentials to access your dashboard.</p>

                <div id="siMsg" class="msg items-start gap-2.5 rounded-xl p-4 mb-5 text-sm font-medium"></div>

                <div class="space-y-4">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Email Address</label>
                        <input type="email" id="siEmail" placeholder="Enter your email"
                            class="field-input w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm font-semibold rounded-lg px-4 py-3 placeholder:text-slate-300 placeholder:font-normal">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Password</label>
                        <input type="password" id="siPassword" placeholder="Enter password"
                            class="field-input w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm font-semibold rounded-lg px-4 py-3 placeholder:text-slate-300">
                    </div>

                    <button id="btnSI" onclick="handleSignIn()"
                        class="w-full bg-red-600 hover:bg-red-700 active:scale-[.98] text-white font-bold text-sm rounded-lg py-3.5 mt-1 shadow-lg shadow-red-600/25 transition-all flex items-center justify-center gap-2.5">
                        <div class="spin" id="siSpin"></div>
                        <span id="siLbl">Sign In</span>
                    </button>
                </div>

                <p class="text-center text-sm text-slate-400 mt-6">
                    Don't have an account?
                    <button onclick="switchTo('signup')" class="text-red-600 font-bold hover:underline ml-1">Sign up</button>
                </p>
            </div>

        <div id="panelSignUp" class="hidden">
    <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight mb-1">Create an account</h1>
    <p class="text-slate-400 text-sm mb-7">Join Stock Alpha.</p>

    <div id="suMsg" class="msg items-start gap-2.5 rounded-xl p-4 mb-5 text-sm font-medium"></div>

    <div class="space-y-4">
        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Full Name</label>
            <input type="text" id="suName" placeholder="Enter your name"
                class="field-input w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm font-semibold rounded-lg px-4 py-3 placeholder:text-slate-300 placeholder:font-normal">
        </div>
        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Email Address</label>
            <input type="email" id="suEmail" placeholder="Enter yor email"
                class="field-input w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm font-semibold rounded-lg px-4 py-3 placeholder:text-slate-300 placeholder:font-normal">
        </div>
        
        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Password</label>
            <input type="password" id="suPassword" placeholder="Create a password"
                class="field-input w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm font-semibold rounded-lg px-4 py-3 placeholder:text-slate-300 placeholder:font-normal">
        </div>
        <div>
            <label class="block text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-1.5">Confirm</label>
            <input type="password" id="suConfirm" placeholder="Confirm your password"
                class="field-input w-full bg-slate-50 border border-slate-200 text-slate-900 text-sm font-semibold rounded-lg px-4 py-3 placeholder:text-slate-300 placeholder:font-normal">
        </div>

        <button id="btnSU" onclick="handleSignUp()"
            class="w-full bg-red-600 hover:bg-red-700 active:scale-[.98] text-white font-bold text-sm rounded-lg py-3.5 mt-1 shadow-lg shadow-red-600/25 transition-all flex items-center justify-center gap-2.5">
            <div class="spin" id="suSpin"></div>
            <span id="suLbl">Create Account</span>
        </button>
    </div>

    <p class="text-center text-sm text-slate-400 mt-6">
        Already have an account?
        <button onclick="switchTo('signin')" class="text-red-600 font-bold hover:underline ml-1">Sign in</button>
    </p>
</div>
   
</div>


<script>
// ================================================================
//  CONFIG
// ================================================================
const API_BASE = '/api';

// ================================================================
//  PANEL SWITCHER
// ================================================================
function switchTo(mode) {
    document.getElementById('panelSignIn').classList.toggle('hidden', mode !== 'signin');
    document.getElementById('panelSignUp').classList.toggle('hidden', mode !== 'signup');
    clearMsg('siMsg'); clearMsg('suMsg');
    document.querySelectorAll('.field-input').forEach(el => el.classList.remove('err'));
}

// ================================================================
//  MESSAGE BOX
// ================================================================
function showMsg(id, text, type = 'error') {
    const el = document.getElementById(id);
    // Reset classes
    el.className = 'msg show items-start gap-2.5 rounded-xl p-4 mb-5 text-sm font-medium';
    if (type === 'error') {
        el.classList.add('bg-red-50', 'border', 'border-red-200', 'text-red-700');
        el.innerHTML = `<svg class="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg><span>${text}</span>`;
    } else {
        el.classList.add('bg-emerald-50', 'border', 'border-emerald-200', 'text-emerald-700');
        el.innerHTML = `<svg class="w-4 h-4 mt-0.5 shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/></svg><span>${text}</span>`;
    }
}
function clearMsg(id) {
    const el = document.getElementById(id);
    el.className = 'msg'; el.innerHTML = '';
}

// ================================================================
//  LOADING STATE
// ================================================================
function setLoading(btnId, spinId, lblId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    document.getElementById(spinId).style.display = loading ? 'block' : 'none';
    document.getElementById(lblId).style.opacity  = loading ? '0.7' : '1';
}

// ================================================================
//  SIGN IN
// ================================================================
async function handleSignIn() {
    const email    = document.getElementById('siEmail').value.trim();
    const password = document.getElementById('siPassword').value;
    clearMsg('siMsg');
    document.querySelectorAll('#panelSignIn .field-input').forEach(el => el.classList.remove('err'));

    if (!email || !password) {
        showMsg('siMsg', 'Please fill in all fields.');
        if (!email)    document.getElementById('siEmail').classList.add('err');
        if (!password) document.getElementById('siPassword').classList.add('err');
        return;
    }

    setLoading('btnSI', 'siSpin', 'siLbl', true);
    try {
        const res  = await fetch(`${API_BASE}/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) {
            showMsg('siMsg', data.detail || 'Authentication failed. Please check your credentials.');
        } else {
            localStorage.setItem('trinity_token', data.access_token);
            renderDashboard(data.user);
        }
    } catch {
        showMsg('siMsg', 'Cannot reach the server. Is FastAPI running on port 8000?');
    } finally {
        setLoading('btnSI', 'siSpin', 'siLbl', false);
    }
}

// ================================================================
//  SIGN UP
// ================================================================
async function handleSignUp() {
    const name     = document.getElementById('suName').value.trim();
    const email    = document.getElementById('suEmail').value.trim();
    const password = document.getElementById('suPassword').value;
    const confirm  = document.getElementById('suConfirm').value;

    clearMsg('suMsg');
    document.querySelectorAll('#panelSignUp .field-input').forEach(el => el.classList.remove('err'));

    // Required fields
    if (!name || !email || !password || !confirm) {
        showMsg('suMsg', 'All fields are required.');
        if (!name)     document.getElementById('suName').classList.add('err');
        if (!email)    document.getElementById('suEmail').classList.add('err');
        if (!password) document.getElementById('suPassword').classList.add('err');
        if (!confirm)  document.getElementById('suConfirm').classList.add('err');
        return;
    }
    // Minimum length
    if (password.length < 8) {
        showMsg('suMsg', 'Password must be at least 8 characters.');
        document.getElementById('suPassword').classList.add('err');
        return;
    }
    // ★ PASSWORDS MATCH — validated BEFORE any API call ★
    if (password !== confirm) {
        showMsg('suMsg', 'Passwords do not match. Please re-enter them.');
        document.getElementById('suPassword').classList.add('err');
        document.getElementById('suConfirm').classList.add('err');
        return;
    }

    setLoading('btnSU', 'suSpin', 'suLbl', true);
    try {
        const res  = await fetch(`${API_BASE}/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password, confirm_password: confirm })
        });
        const data = await res.json();
        if (!res.ok) {
            showMsg('suMsg', data.detail || 'Registration failed.');
        } else {
            localStorage.setItem('trinity_token', data.access_token);
            showMsg('suMsg', 'Account created successfully! Loading your dashboard…', 'success');
            setTimeout(() => renderDashboard(data.user), 900);
        }
    } catch {
        showMsg('suMsg', 'Cannot reach the server. Is FastAPI running on port 8000?');
    } finally {
        setLoading('btnSU', 'suSpin', 'suLbl', false);
    }
}

// ================================================================
//  SESSION CHECK — runs on every page load
// ================================================================
async function checkSession() {
    const token = localStorage.getItem('trinity_token');
    if (!token) return;
    try {
        const res = await fetch(`${API_BASE}/profile`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            renderDashboard(await res.json());
        } else {
            localStorage.removeItem('trinity_token');
        }
    } catch {
        localStorage.removeItem('trinity_token');
    }
}

// ================================================================
//  RENDER DASHBOARD (เปลี่ยนหน้าไปยังไฟล์แยก)
// ================================================================
function renderDashboard(user) {
    // เก็บ User info ไว้แสดงผลใน Dashboard
    localStorage.setItem('user_name', user.name);
    localStorage.setItem('user_email', user.email);
    
    // เปลี่ยนหน้าไปยังไฟล์ Dashboard.html ทันที
    window.location.href = 'Dashboard.html';
}

// ================================================================
//  LOGOUT
// ================================================================
function handleLogout() {
    localStorage.removeItem('trinity_token');
    localStorage.removeItem('user_name');
    localStorage.removeItem('user_email');
    location.reload();
}

// ================================================================
//  ENTER KEY SUPPORT
// ================================================================
document.getElementById('siPassword').addEventListener('keydown', e => { if (e.key === 'Enter') handleSignIn(); });
document.getElementById('suConfirm').addEventListener('keydown',  e => { if (e.key === 'Enter') handleSignUp(); });

// Auto-clear error highlight on re-type
document.querySelectorAll('.field-input').forEach(el => {
    el.addEventListener('input', () => el.classList.remove('err'));
});

// ================================================================
//  INIT
// ================================================================
checkSession();
</script>
</body>
</html>
